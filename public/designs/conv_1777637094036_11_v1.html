<!DOCTYPE html>
<html>
<head>
  <style>
    .btn {
      --btn-bg: #4f46e5;
      --btn-text: white;
      --btn-padding: 0.75rem 1.5rem;
      --btn-radius: 0.375rem;
      
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background-color: var(--btn-bg);
      color: var(--btn-text);
      padding: var(--btn-padding);
      border-radius: var(--btn-radius);
      font-family: system-ui, sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .btn:hover {
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* Size variants */
    .btn-sm {
      --btn-padding: 0.5rem 1rem;
      font-size: 0.875rem;
    }
    
    .btn-lg {
      --btn-padding: 1rem 2rem;
      font-size: 1.125rem;
    }

    /* Color variants */
    .btn-red {
      --btn-bg: #ef4444;
    }
    
    .btn-green {
      --btn-bg: #10b981;
    }
    
    .btn-gray {
      --btn-bg: #6b7280;
    }

    /* Shape variants */
    .btn-pill {
      --btn-radius: 9999px;
    }
    
    .btn-square {
      --btn-radius: 0;
    }
  </style>
</head>
<body>
  <button class="btn">Default</button>
  <button class="btn btn-sm btn-red">Small Red</button>
  <button class="btn btn-lg btn-green btn-pill">Large Green Pill</button>
  <button class="btn btn-gray btn-square">Gray Square</button>
</body>
</html>
