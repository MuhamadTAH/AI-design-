<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Section</title>
  <style>
    .hero {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      animation: fadeInUp 1s ease-out;
    }

    .hero-title {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .hero-subtitle {
      font-size: 1.25rem;
      margin-bottom: 2rem;
      opacity: 0.9;
      max-width: 600px;
      margin: 1rem auto 2rem;
    }

    .cta-button {
      display: inline-block;
      padding: 1rem 2rem;
      background: white;
      color: #667eea;
      border-radius: 2rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .cta-button:hover {
      transform: translateY(-3px);
    }

    .hero-decor {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .hero-decor div {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 6s infinite ease-in-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    @media (max-width: 768px) {
      .hero-title {
        font-size: 2.5rem;
      }
      .hero-subtitle {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">Transform Your Business Today</h1>
      <p class="hero-subtitle">Our innovative solutions help you achieve your goals faster and more efficiently than ever before.</p>
      <a href="#" class="cta-button">Get Started</a>
    </div>
    
    <!-- Decorative elements -->
    <div class="hero-decor">
      <div style="width: 150px; height: 150px; top: 10%; left: 5%; animation-delay: 0s;"></div>
      <div style="width: 100px; height: 100px; top: 30%; right: 10%; animation-delay: 2s;"></div>
      <div style="width: 80px; height: 80px; bottom: 20%; left: 15%; animation-delay: 4s;"></div>
    </div>
  </section>
</body>
</html>
