<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Message</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --text: #2b2d42;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: grid;
            place-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f8f9fa;
            color: var(--text);
        }
        
        .greeting {
            text-align: center;
            max-width: 32rem;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 1rem 2rem rgba(0,0,0,0.1);
            transform: translateY(0);
            opacity: 1;
            transition: all 0.4s ease-out;
        }
        
        .greeting:hover {
            transform: translateY(-0.5rem);
            box-shadow: 0 1.5rem 3rem rgba(0,0,0,0.15);
        }
        
        h1 {
            font-size: 2.5rem;
            margin: 0 0 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0 0 1.5rem;
        }
        
        .highlight {
            font-weight: 600;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="greeting">
        <h1>Hello There!</h1>
        <p>Welcome to our <span class="highlight">digital space</span>. We're thrilled to have you here and can't wait to show you what we've been working on.</p>
        <p>This is message <span class="highlight">#4</span> in our series of delightful interactions.</p>
    </div>
</body>
</html>
