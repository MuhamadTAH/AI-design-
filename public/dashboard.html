<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huashu Design - AI Design Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .dashboard {
      display: flex;
      height: 100vh;
      background: white;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid #e5e5e5;
      background: white;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 16px;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      background: #d4594c;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .header-right {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 8px 16px;
      background: #d4594c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #c94a3f;
    }

    .btn-secondary {
      background: #e5e5e5;
      color: #333;
    }

    .btn-secondary:hover {
      background: #d0d0d0;
    }

    /* Main Content */
    .content {
      display: flex;
      flex: 1;
      margin-top: 60px;
    }

    /* Left Panel - Chat */
    .chat-panel {
      width: 320px;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #e5e5e5;
      font-size: 14px;
      font-weight: 600;
      color: #666;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    .message.user {
      background: #f0f0f0;
      margin-left: 20px;
    }

    .message.ai {
      background: #fff5f0;
      margin-right: 20px;
    }

    .message.status {
      background: #e8f5e9;
      font-size: 12px;
      color: #2e7d32;
    }

    .input-area {
      padding: 16px;
      border-top: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
    }

    textarea:focus {
      outline: none;
      border-color: #d4594c;
    }

    .input-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .input-controls button {
      flex: 1;
      padding: 8px 12px;
      background: #d4594c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    .input-controls button:hover {
      background: #c94a3f;
    }

    .input-controls button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* Right Panel - Preview + Versions */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-tabs {
      display: flex;
      padding: 0 16px;
      border-bottom: 1px solid #e5e5e5;
      background: white;
    }

    .tab {
      padding: 12px 16px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      color: #666;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: #d4594c;
      border-bottom-color: #d4594c;
    }

    .preview-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-iframe {
      flex: 1;
      border: none;
      background: #f5f5f5;
    }

    .versions-list {
      max-height: 300px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .version-item {
      padding: 12px;
      background: #f9f9f9;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .version-item:hover {
      background: #f0f0f0;
      border-color: #d4594c;
    }

    .version-item.active {
      background: #fff5f0;
      border-color: #d4594c;
    }

    .version-label {
      font-size: 12px;
      font-weight: 600;
      color: #d4594c;
    }

    .version-info {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }

    .version-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .version-actions button {
      padding: 4px 8px;
      background: #e5e5e5;
      border: none;
      border-radius: 3px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .version-actions button:hover {
      background: #d0d0d0;
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #d4594c;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #999;
      text-align: center;
      padding: 40px;
    }

    .empty-state div {
      max-width: 200px;
    }

    .empty-state p {
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo-icon">H</div>
        <span>Design System</span>
      </div>
      <div class="header-right">
        <button class="btn btn-secondary" id="newConversationBtn">New</button>
        <button class="btn" id="shareBtn">Share</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="content">
      <!-- Chat Panel -->
      <div class="chat-panel">
        <div class="chat-header">Chat</div>
        <div class="messages" id="messagesList"></div>
        <div class="input-area">
          <textarea id="messageInput" placeholder="Describe what you want to create..."></textarea>
          <div class="input-controls">
            <button id="sendBtn">Send</button>
          </div>
        </div>
      </div>

      <!-- Preview Panel -->
      <div class="preview-panel">
        <div class="preview-tabs">
          <button class="tab active" data-tab="preview">Preview</button>
          <button class="tab" data-tab="versions">Versions</button>
        </div>

        <div class="preview-content">
          <!-- Preview Tab -->
          <div id="previewTab" class="tab-content" style="flex: 1; overflow: hidden;">
            <iframe id="previewFrame" class="preview-iframe"></iframe>
          </div>

          <!-- Versions Tab -->
          <div id="versionsTab" class="tab-content" style="display: none; overflow: hidden;">
            <div class="versions-list" id="versionsList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========================================================================
    // STATE MANAGEMENT
    // ========================================================================
    
    let conversationId = null;
    let currentVersion = null;
    let isSending = false;
    let versions = [];

    // Initialize conversation ID from localStorage or create new
    function initConversation() {
      conversationId = localStorage.getItem('conversationId');
      if (!conversationId) {
        // New conversation will be created on first message
        addMessage('System', '👋 Ready to design! Describe what you want to create.', 'status');
      } else {
        addMessage('System', `✓ Conversation restored. Send a message to continue.`, 'status');
      }
    }

    // ========================================================================
    // MESSAGE MANAGEMENT
    // ========================================================================

    function addMessage(sender, text, className = '') {
      const messagesList = document.getElementById('messagesList');
      const messageEl = document.createElement('div');
      messageEl.className = `message ${className || (sender === 'You' ? 'user' : 'ai')}`;
      messageEl.textContent = text;
      messagesList.appendChild(messageEl);
      messagesList.scrollTop = messagesList.scrollHeight;
    }

    function clearMessages() {
      document.getElementById('messagesList').innerHTML = '';
    }

    // ========================================================================
    // CHAT FUNCTIONALITY
    // ========================================================================

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();

      console.log('🔵 [sendMessage] Starting...', { message, isSending, conversationId });

      if (!message || isSending) {
        console.log('⚠️ [sendMessage] Skipping - message empty or already sending');
        return;
      }

      isSending = true;
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.innerHTML = `<span class="loading"></span>`;

      try {
        // Add user message to display
        console.log('📝 [sendMessage] Adding user message to display');
        addMessage('You', message, 'user');
        input.value = '';

        // Send to server
        console.log('🌐 [sendMessage] Sending to /api/chat');
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message,
            conversationId: conversationId
          })
        });

        console.log('✅ [sendMessage] Response received, status:', response.status);

        if (!response.ok) {
          throw new Error(`API error: ${response.status}`);
        }

        const data = await response.json();
        console.log('📊 [sendMessage] Response data:', data);

        if (!data) {
          throw new Error('No data received from server');
        }

        // Store conversation ID
        if (!conversationId) {
          console.log('💾 [sendMessage] Setting conversation ID:', data.conversationId);
          conversationId = data.conversationId;
          localStorage.setItem('conversationId', conversationId);
        }

        // Add AI response
        console.log('🤖 [sendMessage] Adding AI response:', data.response?.substring(0, 50) + '...');
        if (data.response) {
          addMessage('AI', data.response, 'ai');
        } else {
          console.warn('⚠️ [sendMessage] No response text in data');
          addMessage('AI', 'Design created!', 'ai');
        }

        // Update versions
        console.log('📋 [sendMessage] Checking saved files:', data.savedFiles?.length || 0);
        if (data.savedFiles && data.savedFiles.length > 0) {
          const fileInfo = data.savedFiles[data.savedFiles.length - 1];
          console.log('💾 [sendMessage] Saved file:', fileInfo.filename);
          addMessage('System', `✓ Saved: ${fileInfo.filename} (v${fileInfo.version})`, 'status');
          
          // Update preview
          console.log('🖼️ [sendMessage] Updating preview:', fileInfo.url);
          updatePreview(fileInfo.url);
          
          // Refresh versions list
          versions.push(fileInfo);
          updateVersionsList();
        }

        console.log('✨ [sendMessage] Complete');

      } catch (error) {
        console.error('❌ [sendMessage] Error:', error);
        console.error('   Stack:', error.stack);
        addMessage('Error', error.message, 'error');
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
        console.log('🔴 [sendMessage] Finished');
      }
    }

    // ========================================================================
    // PREVIEW MANAGEMENT
    // ========================================================================

    function updatePreview(fileUrl) {
      const frame = document.getElementById('previewFrame');
      frame.src = fileUrl;
      currentVersion = fileUrl;
    }

    // ========================================================================
    // VERSIONS MANAGEMENT
    // ========================================================================

    function updateVersionsList() {
      const list = document.getElementById('versionsList');
      list.innerHTML = '';

      if (versions.length === 0) {
        list.innerHTML = '<div class="empty-state"><div><p>No versions yet. Start designing!</p></div></div>';
        return;
      }

      versions.forEach((version, index) => {
        const item = document.createElement('div');
        item.className = `version-item ${currentVersion === version.url ? 'active' : ''}`;
        
        item.innerHTML = `
          <div class="version-label">v${version.version} - ${version.type.toUpperCase()}</div>
          <div class="version-info">
            ${version.timestamp ? new Date(version.timestamp).toLocaleTimeString() : 'Just now'}
            • ${(version.size / 1024).toFixed(1)}KB
          </div>
          <div class="version-actions">
            <button onclick="viewVersion('${version.url}')">View</button>
            <button onclick="downloadVersion('${version.filename}')">Download</button>
          </div>
        `;
        
        list.appendChild(item);
      });
    }

    function viewVersion(url) {
      updatePreview(url);
      document.querySelector('[data-tab="preview"]').click();
    }

    function downloadVersion(filename) {
      const link = document.createElement('a');
      link.href = `/public/designs/${filename}`;
      link.download = filename;
      link.click();
    }

    // ========================================================================
    // TAB SWITCHING
    // ========================================================================

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        
        tab.classList.add('active');
        const tabName = tab.dataset.tab;
        document.getElementById(`${tabName}Tab`).style.display = 'flex';
        
        if (tabName === 'versions') {
          updateVersionsList();
        }
      });
    });

    // ========================================================================
    // EVENT LISTENERS
    // ========================================================================

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById('newConversationBtn').addEventListener('click', () => {
      if (confirm('Start a new conversation? Current conversation will still be saved.')) {
        localStorage.removeItem('conversationId');
        conversationId = null;
        versions = [];
        clearMessages();
        initConversation();
        document.getElementById('previewFrame').src = '';
        document.getElementById('messageInput').focus();
      }
    });

    document.getElementById('shareBtn').addEventListener('click', () => {
      alert(`Share link: ${window.location.href}?conv=${conversationId}`);
    });

    // ========================================================================
    // INITIALIZATION
    // ========================================================================

    window.addEventListener('load', () => {
      initConversation();
      document.getElementById('messageInput').focus();
    });
  </script>
</body>
</html>
